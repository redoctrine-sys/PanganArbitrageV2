name: Scrape Pangan Prices

on:
  schedule:
    # 1×/day — 06:00 WIB = 23:00 UTC
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      start_date:
        description: "PIHPS_START_DATE (YYYY-MM-DD, blank = today WIB)"
        required: false
      end_date:
        description: "PIHPS_END_DATE (YYYY-MM-DD, blank = today WIB)"
        required: false
      price_types:
        description: "PIHPS_PRICE_TYPE (e.g. '1,2,3,4' or 'all', blank = all)"
        required: false

jobs:
  pihps:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: pangan-scraper/package-lock.json

      - name: Install dependencies
        working-directory: pangan-scraper
        run: npm ci

      - name: Run PIHPS scraper (all 4 price types)
        working-directory: pangan-scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PIHPS_BACKUP_EXCEL: "1"
          PIHPS_BACKUP_DIR: "./backups"
          PIHPS_START_DATE: ${{ github.event.inputs.start_date }}
          PIHPS_END_DATE: ${{ github.event.inputs.end_date }}
          PIHPS_PRICE_TYPE: ${{ github.event.inputs.price_types }}
        run: npm run scrape:pihps

      - name: Upload Excel backup as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pihps-backup-${{ github.run_id }}
          path: pangan-scraper/backups/*.xlsx
          retention-days: 90
          if-no-files-found: ignore
